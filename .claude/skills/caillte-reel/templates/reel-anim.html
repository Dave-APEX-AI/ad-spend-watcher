<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<style>
  :root{
    --ink:#0A0F0D; --emerald:#0FB97E; --emerald2:#13d18d; --cream:#F5F3EC;
    --amber:#FFC247; --steel:#8A938F;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1080px;height:1920px;overflow:hidden;background:var(--ink);
    font-family:"Inter","Satoshi","Segoe UI",-apple-system,Roboto,Arial,sans-serif;
    color:var(--cream);-webkit-font-smoothing:antialiased}
  #stage{position:relative;width:1080px;height:1920px;overflow:hidden}
  /* persistent background — never black */
  #glow{position:absolute;width:1500px;height:1500px;border-radius:50%;
    background:radial-gradient(circle, rgba(15,185,126,.22), rgba(15,185,126,0) 60%);
    filter:blur(20px);left:-200px;top:-200px;will-change:transform}
  #grain{position:absolute;inset:0;opacity:.04;
    background-image:radial-gradient(rgba(255,255,255,.6) 1px, transparent 1px);
    background-size:6px 6px}
  /* progress bar */
  #prog{position:absolute;top:0;left:0;height:8px;background:var(--emerald);width:0;
    box-shadow:0 0 20px var(--emerald)}
  /* brand chrome */
  #brand{position:absolute;top:66px;left:80px;display:flex;align-items:center;gap:16px;
    font-size:34px;font-weight:800;letter-spacing:-.5px;z-index:5}
  #bdot{width:24px;height:24px;border-radius:50%;background:var(--emerald);box-shadow:0 0 26px var(--emerald)}
  #handle{position:absolute;bottom:120px;left:0;width:100%;text-align:center;
    font-size:30px;font-weight:700;color:var(--steel);z-index:5}
  /* soundwave */
  #wave{position:absolute;bottom:190px;left:0;width:100%;display:flex;justify-content:center;
    align-items:flex-end;gap:12px;height:120px;z-index:4}
  #wave i{width:14px;border-radius:8px;background:var(--emerald);height:20px}
  /* card */
  #card{position:absolute;left:0;top:0;width:1080px;height:1920px;
    display:flex;flex-direction:column;justify-content:center;padding:120px 96px;z-index:3;
    will-change:transform,opacity}
  .kicker{font-size:36px;font-weight:800;letter-spacing:3px;text-transform:uppercase;
    color:var(--emerald);margin-bottom:36px}
  .kicker.amber{color:var(--amber)}
  h1{font-size:128px;line-height:1.02;font-weight:900;letter-spacing:-4px}
  h2{font-size:96px;line-height:1.05;font-weight:900;letter-spacing:-2px}
  .body{font-size:52px;line-height:1.3;font-weight:500;color:#cdd5d0;margin-top:40px}
  .index{font-size:150px;font-weight:900;color:var(--emerald);line-height:.9;letter-spacing:-6px;margin-bottom:20px}
  .stat{font-size:360px;font-weight:900;line-height:.85;letter-spacing:-12px;color:var(--amber)}
  .stat.win{color:var(--emerald)}
  .stat-label{font-size:54px;font-weight:700;color:var(--steel);margin-top:30px}
  .quote{font-size:104px;line-height:1.12;font-weight:800;letter-spacing:-2px}
  .quote::before{content:"\201C";color:var(--emerald);font-size:150px;line-height:0;display:block;margin-bottom:40px}
  .hl{color:var(--emerald)} .hl-amber{color:var(--amber)}
  .cta-card{background:var(--emerald);color:var(--ink);border-radius:48px;padding:80px}
  .cta-card .big{font-size:84px;font-weight:900;letter-spacing:-2px;line-height:1.05}
  .cta-card .sub{font-size:46px;font-weight:600;margin-top:24px}
</style></head>
<body>
<div id="stage">
  <div id="glow"></div><div id="grain"></div>
  <div id="prog"></div>
  <div id="brand"><span id="bdot"></span>CaillteAI</div>
  <div id="card"></div>
  <div id="wave"></div>
  <div id="handle">@caillte_ai</div>
</div>
<script>
  // Injected by the renderer:
  const SCRIPT = /*__SCRIPT_JSON__*/{"fps":30,"cards":[{"seconds":2.5,"type":"cover","headline":"Reel"}]};
  const cards = SCRIPT.cards;
  let total = 0; const starts = [];
  for (const c of cards){ starts.push(total); total += (c.seconds||2.5); }

  // build soundwave bars once
  const wave = document.getElementById('wave');
  const NB = 28;
  for (let k=0;k<NB;k++){ wave.appendChild(document.createElement('i')); }
  const bars = [...wave.children];

  const card = document.getElementById('card');
  const glow = document.getElementById('glow');
  const prog = document.getElementById('prog');
  const bdot = document.getElementById('bdot');
  let lastI = -1;

  function build(c){
    let h = "";
    const amber = c.amberDot ? "amber" : "";
    switch(c.type){
      case "cover":
        h = (c.kicker?`<div class="kicker ${amber}">${c.kicker}</div>`:"") +
            `<h1>${c.headline||""}</h1>` + (c.body?`<div class="body">${c.body}</div>`:"");
        break;
      case "point":
        h = (c.index?`<div class="index">${c.index}</div>`:"") +
            `<h2>${c.headline||""}</h2>` + (c.body?`<div class="body">${c.body}</div>`:"");
        break;
      case "stat":
        h = `<div class="stat ${c.win?'win':''}">${c.value||""}</div>` +
            (c.label?`<div class="stat-label">${c.label}</div>`:"");
        break;
      case "quote":
        h = `<div class="quote">${c.headline||""}</div>`;
        break;
      case "cta":
        h = `<div class="cta-card"><div class="big">${c.headline||""}</div>` +
            (c.body?`<div class="sub">${c.body}</div>`:"") + `</div>`;
        break;
      default:
        h = `<h1>${c.headline||""}</h1>`;
    }
    card.innerHTML = h;
  }

  const easeOut = x => 1 - Math.pow(1 - x, 3);
  const easeIn  = x => x*x;

  // The renderer calls this for each frame time t (seconds). Deterministic.
  window.renderAt = function(t){
    t = Math.max(0, Math.min(total - 0.001, t));
    let i = 0; while(i < cards.length-1 && t >= starts[i+1]) i++;
    const c = cards[i], lt = t - starts[i], dur = c.seconds||2.5;
    const IN = Math.min(0.5, dur/3), OUT = Math.min(0.45, dur/3);

    if (i !== lastI){ build(c); lastI = i; }

    // in/out animation for the card
    let a = 1, ty = 0, sc = 1;
    if (lt < IN){ const p = easeOut(lt/IN); a = p; ty = (1-p)*70; sc = 0.96 + 0.04*p; }
    else if (lt > dur - OUT){ const p = easeIn((dur-lt)/OUT); a = p; ty = -(1-p)*50; sc = 0.98 + 0.02*p; }
    card.style.opacity = a.toFixed(3);
    card.style.transform = `translateY(${ty.toFixed(1)}px) scale(${sc.toFixed(3)})`;

    // soundwave — lively, brand-coloured (amber if current card is a loss/amber card)
    const amber = !!c.amberDot;
    for (let k=0;k<NB;k++){
      const base = 18, amp = 70;
      const v = Math.abs(Math.sin(t*5.5 + k*0.55) * Math.cos(t*2.1 + k*0.3));
      bars[k].style.height = (base + amp*v).toFixed(0)+'px';
      bars[k].style.background = amber ? 'var(--amber)' : 'var(--emerald)';
      bars[k].style.opacity = (0.45 + 0.55*v).toFixed(2);
    }
    bdot.style.background = amber ? 'var(--amber)' : 'var(--emerald)';
    bdot.style.boxShadow = `0 0 26px ${amber?'var(--amber)':'var(--emerald)'}`;

    // drifting glow + progress
    glow.style.transform =
      `translate(${(Math.sin(t*0.5)*160).toFixed(0)}px, ${(Math.cos(t*0.4)*220 + t*40).toFixed(0)}px)`;
    prog.style.width = ((t/total)*100).toFixed(2)+'%';
  };
  window.__TOTAL__ = total; window.__FPS__ = SCRIPT.fps || 30;
  renderAt(0);
</script>
</body></html>
