<!doctype html>
<html lang="en"><head><meta charset="utf-8"/>
<style>
  :root{--ink:#0A0F0D;--emerald:#0FB97E;--emerald2:#13d18d;--cream:#F5F3EC;--amber:#FFC247;--steel:#8A938F;}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1080px;height:1920px;overflow:hidden;background:var(--ink);
    font-family:"Inter","Satoshi","Segoe UI",-apple-system,Roboto,Arial,sans-serif;
    color:var(--cream);-webkit-font-smoothing:antialiased}
  #stage{position:relative;width:1080px;height:1920px;overflow:hidden}
  #photobg{position:absolute;inset:0;background-size:cover;background-position:center;opacity:0}
  #photoshade{position:absolute;inset:0;opacity:0;
    background:linear-gradient(180deg, rgba(10,15,13,.55) 0%, rgba(10,15,13,.82) 55%, rgba(10,15,13,.95) 100%)}
  #glow{position:absolute;width:1500px;height:1500px;border-radius:50%;
    background:radial-gradient(circle, rgba(15,185,126,.22), rgba(15,185,126,0) 60%);
    filter:blur(20px);left:-200px;top:-200px;will-change:transform}
  #grain{position:absolute;inset:0;opacity:.04;
    background-image:radial-gradient(rgba(255,255,255,.6) 1px, transparent 1px);background-size:6px 6px}
  #prog{position:absolute;top:0;left:0;height:8px;background:var(--emerald);width:0;box-shadow:0 0 20px var(--emerald)}
  /* brand row with mascot */
  #brand{position:absolute;top:60px;left:80px;display:flex;align-items:center;gap:20px;font-size:34px;font-weight:800;letter-spacing:-.5px;z-index:6}
  /* mascot CAL */
  .cal{position:relative;width:84px;height:84px;border-radius:22px;background:#0e1714;border:3px solid var(--emerald);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;box-shadow:0 0 30px rgba(15,185,126,.35)}
  .cal .ear{position:absolute;width:14px;height:34px;border-radius:8px;background:var(--emerald);top:24px}
  .cal .ear.l{left:-12px} .cal .ear.r{right:-12px}
  .cal .mic{position:absolute;width:30px;height:30px;border:5px solid var(--emerald);border-top:none;border-right:none;border-radius:0 0 0 30px;left:-6px;bottom:6px}
  .cal .mouth{display:flex;align-items:flex-end;gap:5px;height:30px}
  .cal .mouth i{width:7px;border-radius:4px;background:var(--emerald);height:8px}
  .cal .live{position:absolute;top:-6px;right:-6px;width:18px;height:18px;border-radius:50%;background:var(--emerald);box-shadow:0 0 16px var(--emerald)}
  #handle{position:absolute;bottom:120px;left:0;width:100%;text-align:center;font-size:30px;font-weight:700;color:var(--steel);z-index:6}
  #wave{position:absolute;bottom:190px;left:0;width:100%;display:flex;justify-content:center;align-items:flex-end;gap:12px;height:120px;z-index:4}
  #wave i{width:14px;border-radius:8px;background:var(--emerald);height:20px}
  #card{position:absolute;left:0;top:0;width:1080px;height:1920px;display:flex;flex-direction:column;justify-content:center;
    padding:120px 96px;z-index:3;will-change:transform,opacity}
  .icon{width:200px;height:200px;margin-bottom:50px}
  .icon svg{width:100%;height:100%}
  .kicker{font-size:36px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:var(--emerald);margin-bottom:36px}
  .kicker.amber{color:var(--amber)}
  h1{font-size:128px;line-height:1.02;font-weight:900;letter-spacing:-4px}
  h2{font-size:96px;line-height:1.05;font-weight:900;letter-spacing:-2px}
  .body{font-size:52px;line-height:1.3;font-weight:500;color:#cdd5d0;margin-top:40px}
  .index{font-size:150px;font-weight:900;color:var(--emerald);line-height:.9;letter-spacing:-6px;margin-bottom:20px}
  .stat{font-size:360px;font-weight:900;line-height:.85;letter-spacing:-12px;color:var(--amber)}
  .stat.win{color:var(--emerald)}
  .stat-label{font-size:54px;font-weight:700;color:var(--steel);margin-top:30px}
  .quote{font-size:104px;line-height:1.12;font-weight:800;letter-spacing:-2px}
  .quote::before{content:"\201C";color:var(--emerald);font-size:150px;line-height:0;display:block;margin-bottom:40px}
  .hl{color:var(--emerald)} .hl-amber{color:var(--amber)}
  .cta-card{background:var(--emerald);color:var(--ink);border-radius:48px;padding:80px}
  .cta-card .big{font-size:84px;font-weight:900;letter-spacing:-2px;line-height:1.05}
  .cta-card .sub{font-size:46px;font-weight:600;margin-top:24px}
  /* big mascot for the mascot card */
  .calbig{width:360px;height:360px;border-radius:64px;background:#0e1714;border:8px solid var(--emerald);position:relative;
    display:flex;align-items:center;justify-content:center;margin:0 auto 60px;box-shadow:0 0 80px rgba(15,185,126,.4)}
  .calbig .ear{position:absolute;width:48px;height:120px;border-radius:26px;background:var(--emerald);top:110px}
  .calbig .ear.l{left:-40px}.calbig .ear.r{right:-40px}
  .calbig .mic{position:absolute;width:110px;height:110px;border:18px solid var(--emerald);border-top:none;border-right:none;border-radius:0 0 0 110px;left:-26px;bottom:20px}
  .calbig .mouth{display:flex;align-items:flex-end;gap:16px;height:120px}
  .calbig .mouth i{width:24px;border-radius:12px;background:var(--emerald);height:30px}
  .calbig .live{position:absolute;top:-14px;right:-14px;width:54px;height:54px;border-radius:50%;background:var(--emerald);box-shadow:0 0 40px var(--emerald)}
  .mascot-line{text-align:center;font-size:80px;font-weight:900;letter-spacing:-2px;line-height:1.08}
</style></head>
<body>
<div id="stage">
  <div id="photobg"></div><div id="photoshade"></div>
  <div id="glow"></div><div id="grain"></div>
  <div id="prog"></div>
  <div id="brand">
    <div class="cal"><span class="ear l"></span><span class="ear r"></span><span class="mic"></span><span class="live"></span>
      <div class="mouth" id="calmouth"><i></i><i></i><i></i><i></i></div></div>
    CaillteAI
  </div>
  <div id="card"></div>
  <div id="wave"></div>
  <div id="handle">@caillte_ai</div>
</div>
<script>
  const SCRIPT = /*__SCRIPT_JSON__*/{"fps":30,"cards":[{"seconds":2.5,"type":"cover","headline":"Reel"}]};
  const cards = SCRIPT.cards;
  let total=0; const starts=[]; for(const c of cards){starts.push(total); total+=(c.seconds||2.5);}
  if(SCRIPT.photo){ const pb=document.getElementById('photobg'); pb.style.backgroundImage='url('+SCRIPT.photo+')';
    pb.style.opacity=.5; document.getElementById('photoshade').style.opacity=1; }

  // free inline-SVG icon set (stroke = emerald)
  const ICONS = {
    phone: `<svg viewBox="0 0 24 24" fill="none" stroke="#0FB97E" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M6.6 10.8a15 15 0 0 0 6.6 6.6l2.2-2.2a1 1 0 0 1 1-.24 11 11 0 0 0 3.5.56 1 1 0 0 1 1 1V20a1 1 0 0 1-1 1A17 17 0 0 1 3 4a1 1 0 0 1 1-1h3.5a1 1 0 0 1 1 1 11 11 0 0 0 .56 3.5 1 1 0 0 1-.24 1z"/><path d="M16 3l5 5M21 3l-5 5" stroke="#FFC247"/></svg>`,
    alarm: `<svg viewBox="0 0 24 24" fill="none" stroke="#FFC247" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l2.5 2.5M5 3 2 6M19 3l3 3M9 21h6"/></svg>`,
    van: `<svg viewBox="0 0 24 24" fill="none" stroke="#0FB97E" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h11v9H3zM14 9h4l3 3v3h-7z"/><circle cx="7" cy="17" r="2"/><circle cx="17" cy="17" r="2"/></svg>`,
    pound: `<svg viewBox="0 0 24 24" fill="none" stroke="#FFC247" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M16 6a4 4 0 0 0-7 2.6V12H7m0 0h6m-6 0v3.5C7 17 6 18 6 18h11"/></svg>`,
    wave: `<svg viewBox="0 0 24 24" fill="none" stroke="#0FB97E" stroke-width="1.8" stroke-linecap="round"><path d="M4 12h2M8 8v8M12 5v14M16 8v8M20 12h0"/></svg>`,
  };

  const card=document.getElementById('card'), glow=document.getElementById('glow'),
        prog=document.getElementById('prog'), calmouth=[...document.getElementById('calmouth').children];
  const wave=document.getElementById('wave'); const NB=28;
  for(let k=0;k<NB;k++) wave.appendChild(document.createElement('i'));
  const bars=[...wave.children]; let lastI=-1;

  function calMarkup(){return `<span class="ear l"></span><span class="ear r"></span><span class="mic"></span><span class="live"></span><div class="mouth" id="bigmouth"><i></i><i></i><i></i><i></i><i></i></div>`;}
  function build(c){
    const amber=c.amberDot?"amber":""; const ic=c.icon&&ICONS[c.icon]?`<div class="icon">${ICONS[c.icon]}</div>`:"";
    let h="";
    switch(c.type){
      case "cover": h=ic+(c.kicker?`<div class="kicker ${amber}">${c.kicker}</div>`:"")+`<h1>${c.headline||""}</h1>`+(c.body?`<div class="body">${c.body}</div>`:""); break;
      case "point": h=ic+(c.index?`<div class="index">${c.index}</div>`:"")+`<h2>${c.headline||""}</h2>`+(c.body?`<div class="body">${c.body}</div>`:""); break;
      case "stat": h=ic+`<div class="stat ${c.win?'win':''}">${c.value||""}</div>`+(c.label?`<div class="stat-label">${c.label}</div>`:""); break;
      case "quote": h=`<div class="quote">${c.headline||""}</div>`; break;
      case "cta": h=`<div class="cta-card"><div class="big">${c.headline||""}</div>`+(c.body?`<div class="sub">${c.body}</div>`:"")+`</div>`; break;
      case "mascot": h=`<div class="calbig">${calMarkup()}</div><div class="mascot-line">${c.headline||""}</div>`; break;
      default: h=`<h1>${c.headline||""}</h1>`;
    }
    card.innerHTML=h;
  }
  const easeOut=x=>1-Math.pow(1-x,3), easeIn=x=>x*x;
  function pulseMouth(els,t,amber){for(let k=0;k<els.length;k++){const v=Math.abs(Math.sin(t*8+k*0.9));els[k].style.height=(8+34*v).toFixed(0)+'px';els[k].style.background=amber?'var(--amber)':'var(--emerald)';}}

  window.renderAt=function(t){
    t=Math.max(0,Math.min(total-0.001,t));
    let i=0; while(i<cards.length-1 && t>=starts[i+1]) i++;
    const c=cards[i], lt=t-starts[i], dur=c.seconds||2.5;
    const IN=Math.min(0.5,dur/3), OUT=Math.min(0.45,dur/3);
    if(i!==lastI){build(c); lastI=i;}
    let a=1,ty=0,sc=1;
    if(lt<IN){const p=easeOut(lt/IN); a=p; ty=(1-p)*70; sc=0.96+0.04*p;}
    else if(lt>dur-OUT){const p=easeIn((dur-lt)/OUT); a=p; ty=-(1-p)*50; sc=0.98+0.02*p;}
    card.style.opacity=a.toFixed(3); card.style.transform=`translateY(${ty.toFixed(1)}px) scale(${sc.toFixed(3)})`;
    const amber=!!c.amberDot;
    for(let k=0;k<NB;k++){const v=Math.abs(Math.sin(t*5.5+k*0.55)*Math.cos(t*2.1+k*0.3));
      bars[k].style.height=(18+70*v).toFixed(0)+'px'; bars[k].style.background=amber?'var(--amber)':'var(--emerald)'; bars[k].style.opacity=(0.45+0.55*v).toFixed(2);}
    pulseMouth(calmouth,t,amber);
    const bm=document.getElementById('bigmouth'); if(bm) pulseMouth([...bm.children],t,amber);
    glow.style.transform=`translate(${(Math.sin(t*0.5)*160).toFixed(0)}px, ${(Math.cos(t*0.4)*220+t*40).toFixed(0)}px)`;
    prog.style.width=((t/total)*100).toFixed(2)+'%';
  };
  window.__TOTAL__=total; window.__FPS__=SCRIPT.fps||30; renderAt(0);
</script>
</body></html>
