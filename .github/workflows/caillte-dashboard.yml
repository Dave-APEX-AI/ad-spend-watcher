# Refresh the dashboard's live data (social/dashboard/data.json) from real IG numbers.
name: caillte-dashboard

on:
  workflow_dispatch: {}
  schedule:
    - cron: "30 6 * * *"   # daily 06:30 UTC

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build data.json
        env:
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
        run: python3 social/dashboard/dashboard_data.py
      - name: Commit data.json
        run: |
          if [ -n "$(git status --porcelain social/dashboard/data.json)" ]; then
            git config user.name  "caillte-bot"
            git config user.email "actions@users.noreply.github.com"
            git add social/dashboard/data.json
            git commit -m "dashboard: refresh live data [skip ci]"
            git push
          else
            echo "no data change"
          fi
