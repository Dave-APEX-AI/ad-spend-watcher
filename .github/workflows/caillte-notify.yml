# One-off email notifier — emails hello@caillteai.com via Web3Forms.
# Used to send the "weekly drop done" overview (and any manual update).
# Requires repo secret WEB3FORMS_KEY (register hello@caillteai.com at web3forms.com).

name: caillte-notify

on:
  workflow_dispatch:
    inputs:
      subject:
        description: "Email subject"
        required: true
        default: "CaillteAI — update"
      message:
        description: "Email body"
        required: true
        default: ""

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Send email
        env:
          WEB3FORMS_KEY: ${{ secrets.WEB3FORMS_KEY }}
        run: python3 social/publish/notify.py "${{ github.event.inputs.subject }}" "${{ github.event.inputs.message }}"
