<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ad Spend Watcher — Snapshot 13 April 2026</title>
<style>
  /* ── Design tokens ── */
  :root {
    --bg-primary:   #FFFFFF;
    --bg-secondary: #F7F6F3;
    --bg-tertiary:  #EEEDE9;
    --border-primary:   #C8C7C2;
    --border-secondary: #DDDCDA;
    --border-tertiary:  #E8E7E4;
    --text-primary:   #1A1A18;
    --text-secondary: #696860;
    --text-tertiary:  #9B9A95;
    --text-success:   #085041;
    --bg-success:     #E1F5EE;
    --border-success: #A8D9C8;
    --color-hot:     #1D9E75;
    --color-warm:    #BA7517;
    --color-watch:   #888780;
    --radius-md: 6px;
    --radius-lg: 10px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 14px;
    color: var(--text-primary);
    background: var(--bg-secondary);
    min-height: 100vh;
  }

  /* ── App shell ── */
  .app-header {
    background: var(--bg-primary);
    border-bottom: 0.5px solid var(--border-secondary);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .app-title { font-size: 15px; font-weight: 600; color: var(--text-primary); }
  .app-subtitle { font-size: 12px; color: var(--text-secondary); margin-top: 1px; }
  .last-updated { font-size: 11px; color: var(--text-tertiary); }

  .container { max-width: 960px; margin: 0 auto; padding: 20px 20px 60px; }

  /* ── Metrics row ── */
  .metrics {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 10px;
    margin-bottom: 18px;
  }
  .metric {
    background: var(--bg-primary);
    border-radius: var(--radius-md);
    padding: 12px 14px;
    border: 0.5px solid var(--border-tertiary);
  }
  .metric-label { font-size: 11px; color: var(--text-secondary); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.4px; }
  .metric-val   { font-size: 22px; font-weight: 500; color: var(--text-primary); line-height: 1; }
  .metric-sub   { font-size: 11px; color: var(--color-hot); margin-top: 3px; }

  /* ── Sector tabs ── */
  .sector-tabs { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
  .tab {
    font-size: 12px; padding: 5px 13px;
    border-radius: 20px;
    border: 0.5px solid var(--border-secondary);
    background: var(--bg-primary);
    color: var(--text-secondary);
    cursor: pointer;
    transition: all .12s;
    white-space: nowrap;
  }
  .tab:hover { border-color: var(--border-primary); color: var(--text-primary); }
  .tab.active { border-color: var(--border-primary); color: var(--text-primary); font-weight: 500; background: var(--bg-secondary); }

  /* ── Filter bar ── */
  .filter-bar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
  .filter-bar select {
    font-size: 12px; padding: 6px 10px;
    border-radius: var(--radius-md);
    border: 0.5px solid var(--border-secondary);
    background: var(--bg-primary);
    color: var(--text-primary);
    height: 32px;
    cursor: pointer;
    outline: none;
  }
  .filter-bar select:focus { border-color: var(--border-primary); }
  .result-count { font-size: 12px; color: var(--text-tertiary); margin-left: auto; }

  /* ── Company grid ── */
  .company-grid { display: flex; flex-direction: column; gap: 10px; }

  /* ── Company card ── */
  .card {
    background: var(--bg-primary);
    border: 0.5px solid var(--border-tertiary);
    border-radius: var(--radius-lg);
    padding: 14px 16px;
    transition: border-color .12s, box-shadow .12s;
  }
  .card:hover { border-color: var(--border-secondary); box-shadow: 0 1px 6px rgba(0,0,0,0.05); }
  .card-hot {
    border-left: 3px solid var(--color-hot);
    border-radius: 0 var(--radius-lg) var(--radius-lg) 0;
  }

  /* Card header */
  .card-top { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 12px; }
  .avatar {
    width: 40px; height: 40px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 600; font-size: 13px; flex-shrink: 0;
    letter-spacing: 0.5px;
  }
  .card-meta { flex: 1; min-width: 0; }
  .card-name {
    font-size: 14px; font-weight: 500; color: var(--text-primary);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    display: flex; align-items: center; gap: 6px;
  }
  .card-sub { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

  /* Score badge */
  .score-badge {
    font-size: 12px; font-weight: 500;
    padding: 3px 10px; border-radius: 20px;
    flex-shrink: 0; white-space: nowrap;
  }
  .score-hot  { background: var(--bg-success); color: var(--text-success); }
  .score-warm { background: #FAEEDA; color: #633806; }
  .score-watch { background: #F1EFE8; color: #444441; }

  /* IE badge */
  .ie-badge {
    font-size: 10px; padding: 1px 5px;
    border-radius: 4px;
    background: var(--bg-success); color: var(--text-success);
    font-weight: 500; flex-shrink: 0;
  }

  /* Hot trigger tag */
  .trigger-tag {
    font-size: 10px; padding: 2px 7px;
    border-radius: 20px;
    background: #E6F1FB; color: #0C447C;
    font-weight: 500; flex-shrink: 0; white-space: nowrap;
  }

  /* Card body — 3 column data */
  .card-body {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin-bottom: 12px;
  }
  .info-block { font-size: 12px; }
  .info-label { color: var(--text-secondary); margin-bottom: 2px; font-size: 11px; }
  .info-val   { color: var(--text-primary); font-weight: 500; }

  /* Platform pills */
  .platforms { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 12px; }
  .platform-pill {
    font-size: 11px; padding: 2px 9px;
    border-radius: 20px;
    border: 0.5px solid var(--border-tertiary);
    color: var(--text-tertiary);
    background: transparent;
  }
  .platform-pill.active { background: #E6F1FB; border-color: #85B7EB; color: #0C447C; }

  /* Sparkline row */
  .sparkline-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  .sparkline-label { font-size: 11px; color: var(--text-tertiary); width: 54px; flex-shrink: 0; }
  .sparkline-wrap { flex: 1; height: 28px; }
  .sparkline-wrap svg { width: 100%; height: 28px; }
  .sparkline-pct { font-size: 11px; color: var(--color-hot); font-weight: 500; width: 38px; text-align: right; flex-shrink: 0; }
  .sparkline-pct.warm { color: var(--color-warm); }
  .sparkline-pct.watch { color: var(--color-watch); }

  /* Contact row */
  .contact-row {
    display: flex; align-items: center; justify-content: space-between;
    padding-top: 10px;
    border-top: 0.5px solid var(--border-tertiary);
  }
  .contact-info .contact-name { font-size: 13px; font-weight: 500; color: var(--text-primary); }
  .contact-info .contact-role { font-size: 11px; color: var(--text-secondary); margin-top: 1px; }
  .contact-links { display: flex; gap: 6px; }

  .btn-email {
    font-size: 11px; padding: 5px 11px;
    border-radius: var(--radius-md);
    border: 0.5px solid var(--border-secondary);
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    transition: background .12s;
  }
  .btn-email:hover { background: var(--bg-secondary); }

  .btn-reach {
    font-size: 11px; padding: 5px 11px;
    border-radius: var(--radius-md);
    border: 0.5px solid var(--border-success);
    background: var(--bg-success);
    color: var(--text-success);
    cursor: pointer;
    font-weight: 500;
    transition: filter .12s;
  }
  .btn-reach:hover { filter: brightness(0.95); }

  /* ── Empty state ── */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-tertiary);
  }
  .empty-state h3 { font-size: 15px; font-weight: 500; margin-bottom: 6px; color: var(--text-secondary); }
  .empty-state p  { font-size: 13px; }

  /* ── Prompt modal overlay ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.35);
    z-index: 200; align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg-primary);
    border-radius: var(--radius-lg);
    padding: 20px 22px;
    max-width: 620px; width: 90vw;
    max-height: 80vh; overflow-y: auto;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12);
  }
  .modal-title { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
  .modal-body {
    font-size: 13px; color: var(--text-secondary);
    line-height: 1.65;
    white-space: pre-wrap;
    background: var(--bg-secondary);
    border-radius: var(--radius-md);
    padding: 14px;
    margin-bottom: 14px;
  }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .btn-copy {
    font-size: 12px; padding: 6px 14px;
    border-radius: var(--radius-md);
    border: 0.5px solid var(--border-secondary);
    background: var(--bg-secondary);
    color: var(--text-secondary);
    cursor: pointer;
  }
  .btn-copy.copied { color: var(--text-success); border-color: var(--border-success); }
  .btn-close {
    font-size: 12px; padding: 6px 14px;
    border-radius: var(--radius-md);
    border: 0.5px solid var(--border-primary);
    background: var(--text-primary);
    color: var(--bg-primary);
    cursor: pointer;
  }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    .metrics { grid-template-columns: repeat(2, 1fr); }
    .card-body { grid-template-columns: 1fr 1fr; }
    .filter-bar { gap: 6px; }
    .result-count { display: none; }
  }
</style>
</head>

</div>

/* ── State ── */
let COMPANIES = [...SAMPLE_DATA];
let activeSector = 'All';
let currentPrompt = '';

/* ── Load data ── */
async function loadData() {
  // Snapshot: data embedded — no fetch needed.
  const el = document.getElementById('last-updated');
  el.textContent = 'Snapshot: Sun 13 Apr 2026';

  initTabs();
  render();
}

/* ── Tabs ── */
function initTabs() {
  document.getElementById('tabs').innerHTML = SECTORS.map(s =>
    `<div class="tab${s === activeSector ? ' active' : ''}" onclick="setSector('${s}')">${s}</div>`
  ).join('');
}

function setSector(s) { activeSector = s; initTabs(); render(); }

/* ── Helpers ── */
function scoreClass(s) { return s >= 85 ? 'score-hot' : s >= 65 ? 'score-warm' : 'score-watch'; }
function scoreLabel(s) { return s >= 85 ? 'Hot' : s >= 65 ? 'Warm' : 'Watch'; }
function sparkColor(s) { return s >= 85 ? '#1D9E75' : s >= 65 ? '#BA7517' : '#888780'; }
function pctClass(s)   { return s >= 85 ? '' : s >= 65 ? ' warm' : ' watch'; }

function pct(data) {
  if (!data || data.length < 2) return 0;
  const start = data[0];
  const end   = data[data.length - 1];
  if (!start) return 0;
  return Math.round(((end - start) / start) * 100);
}

function staffLabel(s) {
  const n = parseInt(s);
  if (isNaN(n)) return s;
  if (n >= 50) return '50+ staff';
  if (n >= 20) return `${n} staff`;
  return `${n} staff`;
}

function platformPill(key, active) {
  const labels = { google: 'Google', meta: 'Meta', tiktok: 'TikTok' };
  return `<span class="platform-pill${active ? ' active' : ''}">${labels[key]}</span>`;
}

/* ── Sparklines ── */
function drawSpark(id, data, color) {
  const svg = document.getElementById('spk-' + id);
  if (!svg || !data || data.length < 2) return;
  const max = Math.max(...data), min = Math.min(...data), range = max - min || 1;
  const pts = data.map((v, i) => {
    const x = Math.round(i * (120 / (data.length - 1)));
    const y = Math.round(26 - ((v - min) / range) * 22);
    return `${x},${y}`;
  }).join(' ');
  svg.innerHTML = `<polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>`;
}

/* ── Prompts ── */
function emailPrompt(c) {
  return `Draft a cold outreach email to ${c.contact.name} at ${c.name}, a ${c.sector} company in ${c.region_label} spending on ${(c.platforms||[]).join(', ')} ads for ${c.tenure_label}. Their audience is ${c.audience}. Keywords they bid on: ${c.keywords}. Lead with a specific observation about their ad activity. Keep it under 150 words. Subject line should reference something specific — never use a generic opener.`;
}

function sequencePrompt(c) {
  return `Build the full 3-part outreach sequence for ${c.name}:\n\n(1) Cold email — day 1: specific opening referencing their ad activity on ${(c.platforms||[]).join(', ')}, one-sentence hook, single ask for a 15-minute call. Under 150 words.\n\n(2) LinkedIn connection request — day 3: under 300 characters, references the email you sent.\n\n(3) Call script — day 7: strong opening line proving research, 3 qualifying questions, close to book a call.\n\nDecision maker: ${c.contact.name}, ${c.contact.role}.\nCompany: ${c.sector} in ${c.region_label}, advertising on ${(c.platforms||[]).join(', ')} for ${c.tenure_label}, targeting ${c.audience}.`;
}

/* ── Prompt modal ── */
function sendPrompt(type, companyId) {
  const c = COMPANIES.find(x => x.id === companyId);
  if (!c) return;
  const prompt = type === 'email' ? emailPrompt(c) : sequencePrompt(c);
  currentPrompt = prompt;
  document.getElementById('modal-title').textContent = type === 'email' ? 'Email draft prompt' : '3-part outreach sequence prompt';
  document.getElementById('modal-body').textContent = prompt;
  document.getElementById('btn-copy').textContent = 'Copy prompt';
  document.getElementById('btn-copy').classList.remove('copied');
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(event) {
  if (event.target === document.getElementById('modal-overlay')) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('modal-overlay').classList.remove('open');
}

async function copyPrompt() {
  try {
    await navigator.clipboard.writeText(currentPrompt);
    const btn = document.getElementById('btn-copy');
    btn.textContent = '✓ Copied';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy prompt'; btn.classList.remove('copied'); }, 2000);
  } catch(e) {
    console.error('Copy failed:', e);
  }
}

/* ── Render ── */
function render() {
  const sort     = document.getElementById('sort-sel').value;
  const region   = document.getElementById('region-sel').value;
  const platform = document.getElementById('platform-sel').value;

  let data = [...COMPANIES];
  if (activeSector !== 'All') data = data.filter(c => c.sector === activeSector);
  if (region !== 'all')       data = data.filter(c => c.region === region);
  if (platform !== 'all')     data = data.filter(c => (c.platforms || []).includes(platform));

  if (sort === 'score')       data.sort((a, b) => b.score - a.score);
  else if (sort === 'spend')  data.sort((a, b) => b.tenure_months - a.tenure_months);
  else                         data.sort((a, b) => parseInt(b.staff) - parseInt(a.staff));

  /* ── Metrics (always from full dataset) ── */
  const all = COMPANIES;
  document.getElementById('m-total').textContent = all.length;
  document.getElementById('m-hot').textContent = all.filter(c => c.score >= 85).length;
  const avgT = all.length ? (all.reduce((s, c) => s + (c.tenure_months || 0), 0) / all.length).toFixed(1) : '0';
  document.getElementById('m-tenure').textContent = avgT + 'm';
  document.getElementById('m-sectors').textContent = [...new Set(all.map(c => c.sector))].length;
  document.getElementById('result-count').textContent = data.length + ' companies';

  /* ── Cards ── */
  if (data.length === 0) {
    document.getElementById('grid').innerHTML = `
      <div class="empty-state">
        <h3>No companies match this filter</h3>
        <p>Try adjusting the region or platform filters, or select a different sector tab.</p>
      </div>`;
    return;
  }

  document.getElementById('grid').innerHTML = data.map(c => {
    const p = pct(c.spend);
    const pSign = p >= 0 ? '+' : '';
    return `
<div class="card${c.score >= 85 ? ' card-hot' : ''}">
  <div class="card-top">
    <div class="avatar" style="background:${c.avatarBg};color:${c.avatarCol}">${c.avatar}</div>
    <div class="card-meta">
      <div class="card-name">
        ${escHtml(c.name)}
        ${c.country === 'IE' ? '<span class="ie-badge">IE</span>' : ''}
        ${c.hot_trigger ? `<span class="trigger-tag">${escHtml(c.hot_trigger)}</span>` : ''}
      </div>
      <div class="card-sub">${escHtml(c.sector)} · ${escHtml(c.region_label)} · ${staffLabel(c.staff)}</div>
    </div>
    <div class="score-badge ${scoreClass(c.score)}">${scoreLabel(c.score)} ${c.score}</div>
  </div>

  <div class="card-body">
    <div class="info-block">
      <div class="info-label">Ad tenure</div>
      <div class="info-val">${escHtml(c.tenure_label)}</div>
    </div>
    <div class="info-block">
      <div class="info-label">Audience</div>
      <div class="info-val" style="font-size:11px">${escHtml(c.audience)}</div>
    </div>
    <div class="info-block">
      <div class="info-label">Top keywords</div>
      <div class="info-val" style="font-size:11px">${escHtml(c.keywords)}</div>
    </div>
  </div>

  <div class="platforms">
    ${['google','meta','tiktok'].map(p => platformPill(p, (c.platforms||[]).includes(p))).join('')}
  </div>

  <div class="sparkline-row">
    <span class="sparkline-label">Spend trend</span>
    <div class="sparkline-wrap">
      <svg id="spk-${c.id}" viewBox="0 0 120 28" preserveAspectRatio="none"></svg>
    </div>
    <span class="sparkline-pct${pctClass(c.score)}">${pSign}${p}%</span>
  </div>

  <div class="contact-row">
    <div class="contact-info">
      <div class="contact-name">${escHtml(c.contact.name)}</div>
      <div class="contact-role">${escHtml(c.contact.role)}</div>
    </div>
    <div class="contact-links">
      <button class="btn-email" onclick="sendPrompt('email', ${c.id})">Email draft ↗</button>
      <button class="btn-reach" onclick="sendPrompt('sequence', ${c.id})">Reach out ↗</button>
    </div>
  </div>
</div>`;
  }).join('');

  // Draw sparklines after DOM update
  requestAnimationFrame(() => {
    data.forEach(c => drawSpark(c.id, c.spend, sparkColor(c.score)));
  });
}

/* ── XSS guard ── */
function escHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

/* ── Boot ── */
loadData();
</script>
