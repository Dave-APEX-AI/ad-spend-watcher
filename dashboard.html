<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ad Spend Watcher — UK & Ireland Trades</title>
<style>
  /* ── Design tokens ── */
  :root {
    --bg-primary:   #FFFFFF;
    --bg-secondary: #F7F6F3;
    --bg-tertiary:  #EEEDE9;
    --border-primary:   #C8C7C2;
    --border-secondary: #DDDCDA;
    --border-tertiary:  #E8E7E4;
    --text-primary:   #1A1A18;
    --text-secondary: #696860;
    --text-tertiary:  #9B9A95;
    --text-success:   #085041;
    --bg-success:     #E1F5EE;
    --border-success: #A8D9C8;
    --color-hot:     #1D9E75;
    --color-warm:    #BA7517;
    --color-watch:   #888780;
    --radius-md: 6px;
    --radius-lg: 10px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 14px;
    color: var(--text-primary);
    background: var(--bg-secondary);
    min-height: 100vh;
  }

  /* ── App shell ── */
  .app-header {
    background: var(--bg-primary);
    border-bottom: 0.5px solid var(--border-secondary);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .app-title { font-size: 15px; font-weight: 600; color: var(--text-primary); }
  .app-subtitle { font-size: 12px; color: var(--text-secondary); margin-top: 1px; }
  .last-updated { font-size: 11px; color: var(--text-tertiary); }

  .container { max-width: 960px; margin: 0 auto; padding: 20px 20px 60px; }

  /* ── Metrics row ── */
  .metrics {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 10px;
    margin-bottom: 18px;
  }
  .metric {
    background: var(--bg-primary);
    border-radius: var(--radius-md);
    padding: 12px 14px;
    border: 0.5px solid var(--border-tertiary);
  }
  .metric-label { font-size: 11px; color: var(--text-secondary); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.4px; }
  .metric-val   { font-size: 22px; font-weight: 500; color: var(--text-primary); line-height: 1; }
  .metric-sub   { font-size: 11px; color: var(--color-hot); margin-top: 3px; }

  /* ── Sector tabs ── */
  .sector-tabs { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
  .tab {
    font-size: 12px; padding: 5px 13px;
    border-radius: 20px;
    border: 0.5px solid var(--border-secondary);
    background: var(--bg-primary);
    color: var(--text-secondary);
    cursor: pointer;
    transition: all .12s;
    white-space: nowrap;
  }
  .tab:hover { border-color: var(--border-primary); color: var(--text-primary); }
  .tab.active { border-color: var(--border-primary); color: var(--text-primary); font-weight: 500; background: var(--bg-secondary); }

  /* ── Filter bar ── */
  .filter-bar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
  .filter-bar select {
    font-size: 12px; padding: 6px 10px;
    border-radius: var(--radius-md);
    border: 0.5px solid var(--border-secondary);
    background: var(--bg-primary);
    color: var(--text-primary);
    height: 32px;
    cursor: pointer;
    outline: none;
  }
  .filter-bar select:focus { border-color: var(--border-primary); }
  .result-count { font-size: 12px; color: var(--text-tertiary); margin-left: auto; }

  /* ── Company grid ── */
  .company-grid { display: flex; flex-direction: column; gap: 10px; }

  /* ── Company card ── */
  .card {
    background: var(--bg-primary);
    border: 0.5px solid var(--border-tertiary);
    border-radius: var(--radius-lg);
    padding: 14px 16px;
    transition: border-color .12s, box-shadow .12s;
  }
  .card:hover { border-color: var(--border-secondary); box-shadow: 0 1px 6px rgba(0,0,0,0.05); }
  .card-hot {
    border-left: 3px solid var(--color-hot);
    border-radius: 0 var(--radius-lg) var(--radius-lg) 0;
  }

  /* Card header */
  .card-top { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 12px; }
  .avatar {
    width: 40px; height: 40px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-weight: 600; font-size: 13px; flex-shrink: 0;
    letter-spacing: 0.5px;
  }
  .card-meta { flex: 1; min-width: 0; }
  .card-name {
    font-size: 14px; font-weight: 500; color: var(--text-primary);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    display: flex; align-items: center; gap: 6px;
  }
  .card-sub { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

  /* Hyperlink on the company name when we captured a Facebook page URL.
     Underline-on-hover only — keeps the card looking calm at rest. */
  .name-link {
    color: inherit; text-decoration: none;
    border-bottom: 1px dotted transparent;
    transition: border-color 120ms ease;
  }
  .name-link:hover { border-bottom-color: currentColor; }
  .link-arrow {
    font-size: 10px; opacity: 0.55;
    margin-left: 2px; vertical-align: super;
  }
  .name-link:hover .link-arrow { opacity: 0.9; }
  /* Source confidence badge — only shown when the URL came from the Google
     fallback rung. Tells the user "verify this one before you act on it". */
  .src-badge {
    display: inline-flex; align-items: center; justify-content: center;
    width: 14px; height: 14px;
    border-radius: 50%;
    font-size: 9px; font-weight: 700;
    flex-shrink: 0;
    cursor: help;
  }
  .src-google { background: #FEF3C7; color: #78350F; }

  /* Score badge */
  .score-badge {
    font-size: 12px; font-weight: 500;
    padding: 3px 10px; border-radius: 20px;
    flex-shrink: 0; white-space: nowrap;
  }
  .score-hot  { background: var(--bg-success); color: var(--text-success); }
  .score-warm { background: #FAEEDA; color: #633806; }
  .score-watch { background: #F1EFE8; color: #444441; }

  /* IE badge */
  .ie-badge {
    font-size: 10px; padding: 1px 5px;
    border-radius: 4px;
    background: var(--bg-success); color: var(--text-success);
    font-weight: 500; flex-shrink: 0;
  }

  /* Hot trigger tag */
  .trigger-tag {
    font-size: 10px; padding: 2px 7px;
    border-radius: 20px;
    background: #E6F1FB; color: #0C447C;
    font-weight: 500; flex-shrink: 0; white-space: nowrap;
  }

  /* "NEW this week" badge — surfaces advertisers first seen in the latest scrape */
  .new-badge {
    font-size: 10px; padding: 2px 7px;
    border-radius: 20px;
    background: #FEF3C7; color: #78350F;
    font-weight: 600; flex-shrink: 0; white-space: nowrap;
    letter-spacing: 0.5px;
  }

  /* Fresh-spenders banner above the grid */
  .new-banner {
    background: #FEF3C7; color: #78350F;
    border: 1px solid #FBBF24;
    border-radius: var(--radius-md);
    padding: 10px 14px;
    margin-bottom: 12px;
    font-size: 13px; font-weight: 500;
    display: flex; align-items: center; gap: 10px;
  }
  .new-banner .count {
    background: #78350F; color: #FEF3C7;
    border-radius: 10px;
    padding: 1px 8px; font-weight: 700;
  }

  /* Card body — 3 column data */
  .card-body {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin-bottom: 12px;
  }
  .info-block { font-size: 12px; }
  .info-label { color: var(--text-secondary); margin-bottom: 2px; font-size: 11px; }
  .info-val   { color: var(--text-primary); font-weight: 500; }

  /* Platform pills */
  .platforms { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 12px; }
  .platform-pill {
    font-size: 11px; padding: 2px 9px;
    border-radius: 20px;
    border: 0.5px solid var(--border-tertiary);
    color: var(--text-tertiary);
    background: transparent;
  }
  .platform-pill.active { background: #E6F1FB; border-color: #85B7EB; color: #0C447C; }

  /* Sparkline row */
  .sparkline-row { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  .sparkline-label { font-size: 11px; color: var(--text-tertiary); width: 54px; flex-shrink: 0; }
  .sparkline-wrap { flex: 1; height: 28px; }
  .sparkline-wrap svg { width: 100%; height: 28px; }
  .sparkline-pct { font-size: 11px; color: var(--color-hot); font-weight: 500; width: 38px; text-align: right; flex-shrink: 0; }
  .sparkline-pct.warm { color: var(--color-warm); }
  .sparkline-pct.watch { color: var(--color-watch); }

  /* Contact row */
  .contact-row {
    display: flex; align-items: center; justify-content: space-between;
    padding-top: 10px;
    border-top: 0.5px solid var(--border-tertiary);
  }
  .contact-info .contact-name { font-size: 13px; font-weight: 500; color: var(--text-primary); }
  .contact-info .contact-role { font-size: 11px; color: var(--text-secondary); margin-top: 1px; }
  .contact-links { display: flex; gap: 6px; }

  .btn-email {
    font-size: 11px; padding: 5px 11px;
    border-radius: var(--radius-md);
    border: 0.5px solid var(--border-secondary);
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    transition: background .12s;
  }
  .btn-email:hover { background: var(--bg-secondary); }

  .btn-reach {
    font-size: 11px; padding: 5px 11px;
    border-radius: var(--radius-md);
    border: 0.5px solid var(--border-success);
    background: var(--bg-success);
    color: var(--text-success);
    cursor: pointer;
    font-weight: 500;
    transition: filter .12s;
  }
  .btn-reach:hover { filter: brightness(0.95); }

  /* "Send video" — one-click POST to the Worker that dispatches the sector-matched video email */
  .btn-send-video {
    font-size: 11px; padding: 5px 11px;
    border-radius: var(--radius-md);
    border: 0.5px solid #1D9E75;
    background: #1D9E75;
    color: #fff;
    cursor: pointer;
    font-weight: 600;
    transition: filter .12s, background .12s;
  }
  .btn-send-video:hover:not(:disabled) { filter: brightness(0.95); }
  .btn-send-video:disabled {
    cursor: default;
    opacity: 0.65;
    background: var(--bg-tertiary);
    color: var(--text-secondary);
    border-color: var(--border-secondary);
  }
  .btn-send-video.sent {
    background: var(--bg-success);
    color: var(--text-success);
    border-color: var(--border-success);
    opacity: 1;
  }
  .btn-send-video.skipped {
    background: #FEF3C7;
    color: #78350F;
    border-color: #FBBF24;
    opacity: 1;
  }
  .btn-send-video.no-email {
    cursor: not-allowed;
  }
  .send-status {
    font-size: 10px;
    color: var(--text-tertiary);
    margin-top: 4px;
    text-align: right;
    min-height: 12px;
  }
  .send-status.ok { color: var(--text-success); }
  .send-status.skipped { color: #78350F; }
  .send-status.err { color: #B91C1C; }

  /* ── Empty state ── */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-tertiary);
  }
  .empty-state h3 { font-size: 15px; font-weight: 500; margin-bottom: 6px; color: var(--text-secondary); }
  .empty-state p  { font-size: 13px; }

  /* ── Prompt modal overlay ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.35);
    z-index: 200; align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg-primary);
    border-radius: var(--radius-lg);
    padding: 20px 22px;
    max-width: 620px; width: 90vw;
    max-height: 80vh; overflow-y: auto;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12);
  }
  .modal-title { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
  .modal-body {
    font-size: 13px; color: var(--text-secondary);
    line-height: 1.65;
    white-space: pre-wrap;
    background: var(--bg-secondary);
    border-radius: var(--radius-md);
    padding: 14px;
    margin-bottom: 14px;
  }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .btn-copy {
    font-size: 12px; padding: 6px 14px;
    border-radius: var(--radius-md);
    border: 0.5px solid var(--border-secondary);
    background: var(--bg-secondary);
    color: var(--text-secondary);
    cursor: pointer;
  }
  .btn-copy.copied { color: var(--text-success); border-color: var(--border-success); }
  .btn-close {
    font-size: 12px; padding: 6px 14px;
    border-radius: var(--radius-md);
    border: 0.5px solid var(--border-primary);
    background: var(--text-primary);
    color: var(--bg-primary);
    cursor: pointer;
  }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    .metrics { grid-template-columns: repeat(2, 1fr); }
    .card-body { grid-template-columns: 1fr 1fr; }
    .filter-bar { gap: 6px; }
    .result-count { display: none; }
  }
</style>
</head>

<header class="app-header">

<div class="container">

  </div>

    </select>
    <select id="new-sel" onchange="render()">
      <option value="all">All advertisers</option>
      <option value="new">New this week only</option>
      <option value="returning">Returning only</option>
    </select>
    <span class="result-count" id="result-count"></span>
  </div>

  <!-- Fresh-spenders banner (populated in render()) -->
  <div id="new-banner-slot"></div>

  <!-- Cards -->
  <div class="company-grid" id="grid"></div>
</div>

<!-- Prompt modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-title" id="modal-title">Outreach prompt</div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-actions">
      <button class="btn-copy" id="btn-copy" onclick="copyPrompt()">Copy prompt</button>
      <button class="btn-close" onclick="closeModalDirect()">Close</button>
    </div>
  </div>
</div>

/* ── Helpers ── */
function scoreClass(s) { return s >= 85 ? 'score-hot' : s >= 65 ? 'score-warm' : 'score-watch'; }
function scoreLabel(s) { return s >= 85 ? 'Hot' : s >= 65 ? 'Warm' : 'Watch'; }
function sparkColor(s) { return s >= 85 ? '#1D9E75' : s >= 65 ? '#BA7517' : '#888780'; }
function pctClass(s)   { return s >= 85 ? '' : s >= 65 ? ' warm' : ' watch'; }

function pct(data) {
  if (!data || data.length < 2) return 0;
  const start = data[0];
  const end   = data[data.length - 1];
  if (!start) return 0;
  return Math.round(((end - start) / start) * 100);
}

function staffLabel(s) {
  const n = parseInt(s);
  if (isNaN(n)) return s;
  if (n >= 50) return '50+ staff';
  if (n >= 20) return `${n} staff`;
  return `${n} staff`;
}

function platformPill(key, active) {
  const labels = { google: 'Google', meta: 'Meta', tiktok: 'TikTok' };
  return `<span class="platform-pill${active ? ' active' : ''}">${labels[key]}</span>`;
}

/* ── Sparklines ── */
function drawSpark(id, data, color) {
  const svg = document.getElementById('spk-' + id);
  if (!svg || !data || data.length < 2) return;
  const max = Math.max(...data), min = Math.min(...data), range = max - min || 1;
  const pts = data.map((v, i) => {
    const x = Math.round(i * (120 / (data.length - 1)));
    const y = Math.round(26 - ((v - min) / range) * 22);
    return `${x},${y}`;
  }).join(' ');
  svg.innerHTML = `<polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>`;
}

/* ──────────────────────────────────────────────────────────────────
   Send video (Worker /send)
   ──────────────────────────────────────────────────────────────────
   Wires the dashboard directly to the Cloudflare Worker that dispatches
   the sector-matched video email via Resend. The Worker gates /send on
   an X-Api-Key header — we prompt Dave for it once per browser session
   and cache it in sessionStorage (not localStorage; keys stay out of
   persistent browser storage).
*/
const WORKER_URL = 'https://asw-video.lucky-voice-f07e.workers.dev/send';
const DEFAULT_BCC = 'janalei@apexemeraldai.com';

// Dashboard sector labels → Worker sector slugs. Must match scoring.SECTOR_CONFIG
// labels and worker/asw-video/index.js VALID_SECTORS. Alarms intentionally omitted.
const SECTOR_SLUG = {
  'Solar':             'solar',
  'Plumbing':          'plumbing',
  'Electrical':        'electrical',
  'Insulation':        'insulation',
  'Windows & Doors':   'windows_doors',
  'Drainage':          'drainage',
  'Pumps':             'pumps'
};

let _cachedApiKey = null;
function getApiKey() {
  if (_cachedApiKey) return _cachedApiKey;
  try { _cachedApiKey = sessionStorage.getItem('asw_worker_key') || null; } catch (e) {}
  if (_cachedApiKey) return _cachedApiKey;
  const entered = prompt('Worker API key (one-time this session):');
  if (!entered) return null;
  _cachedApiKey = entered.trim();
  try { sessionStorage.setItem('asw_worker_key', _cachedApiKey); } catch (e) {}
  return _cachedApiKey;
}

function _setSendButtonState(id, { text, disabled, cls, statusText, statusCls }) {
  const btn = document.getElementById(`send-btn-${id}`);
  const status = document.getElementById(`send-status-${id}`);
  if (btn) {
    if (text !== undefined) btn.textContent = text;
    if (disabled !== undefined) btn.disabled = disabled;
    btn.classList.remove('sent', 'skipped');
    if (cls) btn.classList.add(cls);
  }
  if (status) {
    status.className = 'send-status' + (statusCls ? ' ' + statusCls : '');
    status.textContent = statusText || '';
  }
}

async function sendVideo(companyId) {
  const c = COMPANIES.find(x => x.id === companyId);
  if (!c) return;
  const slug = SECTOR_SLUG[c.sector];
  if (!slug) {
    alert(`Can't map sector "${c.sector}" to a Worker slug. Nothing sent.`);
    return;
  }

  // Most advertisers arrive without an enriched contact email — until the
  // enrichment pipeline is wired up, prompt for one at send-time. Email
  // entered here is used for THIS send only (not persisted to companies.json).
  let toEmail = (c.contact && c.contact.email) ? c.contact.email : null;
  if (!toEmail) {
    toEmail = prompt(`No email on file for ${c.name}. Paste the prospect's email to send the ${c.sector} video:`);
    if (!toEmail) return;
    toEmail = toEmail.trim();
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(toEmail)) {
      alert(`That doesn't look like a valid email address: ${toEmail}`);
      return;
    }
  }

  const key = getApiKey();
  if (!key) return;

  const firstName = (c.contact && c.contact.name && c.contact.name !== 'Unknown')
    ? c.contact.name.split(/\s+/)[0]
    : '';
  const confirmMsg =
    `Send the ${c.sector} video to:\n\n` +
    `  ${toEmail}\n` +
    `  (${c.name})\n\n` +
    `BCC: ${DEFAULT_BCC}\n\n` +
    `Worker will refuse a re-send within 60 days. Proceed?`;
  if (!confirm(confirmMsg)) return;

  // Stash for use below
  c.__resolvedEmail = toEmail;

  _setSendButtonState(companyId, { text: 'Sending…', disabled: true, statusText: '' });

  try {
    const resp = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-Api-Key': key },
      body: JSON.stringify({
        sector: slug,
        toEmail: c.__resolvedEmail,
        toName: (c.contact && c.contact.name && c.contact.name !== 'Unknown') ? c.contact.name : (firstName || 'there'),
        toCompany: c.name,
        bccEmail: DEFAULT_BCC
      })
    });
    const body = await resp.json().catch(() => ({}));

    if (resp.status === 401) {
      _cachedApiKey = null;
      try { sessionStorage.removeItem('asw_worker_key'); } catch (e) {}
      _setSendButtonState(companyId, {
        text: 'Send video', disabled: false,
        statusText: 'Auth failed — click again to re-enter key', statusCls: 'err'
      });
      return;
    }
    if (body && body.skipped) {
      _setSendButtonState(companyId, {
        text: 'Already sent', disabled: true, cls: 'skipped',
        statusText: 'Locked out for 60 days per (sector, recipient)', statusCls: 'skipped'
      });
      return;
    }
    if (body && body.ok) {
      const shortId = (body.resendId || '').slice(0, 8);
      _setSendButtonState(companyId, {
        text: 'Sent ✓', disabled: true, cls: 'sent',
        statusText: 'Delivered' + (shortId ? ' · ' + shortId : ''), statusCls: 'ok'
      });
      return;
    }
    _setSendButtonState(companyId, {
      text: 'Send video', disabled: false,
      statusText: 'Failed: ' + ((body && body.error) || resp.status), statusCls: 'err'
    });
  } catch (err) {
    _setSendButtonState(companyId, {
      text: 'Send video', disabled: false,
      statusText: 'Network error: ' + (err && err.message || err), statusCls: 'err'
    });
  }
}

/* ── Ready-to-send email draft ──
   Opens the same modal but populates it with the EXACT email body the Worker
   would send for this sector. VA copies, opens their mail client, pastes into
   a new message, types the verified recipient address, hits send.
*/
function showEmailDraft(companyId) {
  const c = COMPANIES.find(x => x.id === companyId);
  if (!c) return;
  const draft = buildEmailDraft(c);
  if (!draft) {
    alert(`Can't build a draft — sector "${c.sector}" has no Worker mapping.`);
    return;
  }
  if (draft.error) {
    alert(draft.error);
    return;
  }
  // Stash the plain-text version for the fallback copy path. The rich version
  // lives on window._currentHtml so copyPrompt() can put both MIME types on
  // the clipboard (Gmail/Apple Mail then paste the styled button intact).
  currentPrompt = `SUBJECT: ${draft.subject}\n\n${draft.textBody}`;
  window._currentHtml = draft.htmlBody;
  window._currentSubject = draft.subject;

  document.getElementById('modal-title').textContent = `Email draft — ${c.name}`;
  // Render the HTML preview so Dave/VA see the actual formatted email
  // (including the green Watch button) before copying.
  document.getElementById('modal-body').innerHTML =
    `<div style="font-size:12px;color:#696860;margin-bottom:8px;">SUBJECT:</div>
     <div style="font-weight:600;margin-bottom:16px;padding:6px 10px;background:#f7f6f3;border-radius:6px;">${escHtml(draft.subject)}</div>
     <div style="font-size:12px;color:#696860;margin-bottom:8px;">BODY (preview — will paste with button into Gmail):</div>
     <div style="border:1px solid #e8e7e4;border-radius:6px;padding:16px;background:#fff;">${draft.htmlBody}</div>`;
  document.getElementById('btn-copy').textContent = 'Copy email';
  document.getElementById('btn-copy').classList.remove('copied');
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(event) {
  if (event.target === document.getElementById('modal-overlay')) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('modal-overlay').classList.remove('open');
}

async function copyPrompt() {
  const btn = document.getElementById('btn-copy');
  const html = window._currentHtml;
  try {
    if (html && typeof ClipboardItem !== 'undefined' && navigator.clipboard && navigator.clipboard.write) {
      // Rich copy — Gmail/Apple Mail paste this with the green button intact.
      const item = new ClipboardItem({
        'text/html': new Blob([html], { type: 'text/html' }),
        'text/plain': new Blob([currentPrompt], { type: 'text/plain' })
      });
      await navigator.clipboard.write([item]);
    } else {
      // Fallback: plain-text only (AI prompts, or browsers without ClipboardItem)
      await navigator.clipboard.writeText(currentPrompt);
    }
    btn.textContent = '✓ Copied';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = html ? 'Copy email' : 'Copy prompt';
      btn.classList.remove('copied');
    }, 2000);
  } catch(e) {
    console.error('Copy failed:', e);
    // Last-ditch: try plain text
    try {
      await navigator.clipboard.writeText(currentPrompt);
      btn.textContent = '✓ Copied (text only)';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = html ? 'Copy email' : 'Copy prompt'; btn.classList.remove('copied'); }, 2500);
    } catch (e2) {
      alert('Copy failed. Select the text in the modal and use Cmd+C manually.');
    }
  }
}

  if (platform !== 'all')     data = data.filter(c => (c.platforms || []).includes(platform));
  if (newFilter === 'new')        data = data.filter(c => c.is_new_this_week);
  else if (newFilter === 'returning') data = data.filter(c => !c.is_new_this_week);

  // Fresh-spenders banner — always reflects the full dataset for the active sector,
  // regardless of the new/returning filter, so the banner stays useful.
  const bannerSlot = document.getElementById('new-banner-slot');
  if (bannerSlot) {
    const scoped = activeSector === 'All' ? COMPANIES : COMPANIES.filter(c => c.sector === activeSector);
    const newCount = scoped.filter(c => c.is_new_this_week).length;
    bannerSlot.innerHTML = newCount > 0
      ? `<div class="new-banner"><span class="count">${newCount}</span> new advertiser${newCount === 1 ? '' : 's'} this week${activeSector === 'All' ? ' across all sectors' : ' in ' + activeSector}. Filter above to see just the fresh ones.</div>`
      : '';
  }

  if (sort === 'score')       data.sort((a, b) => b.score - a.score);
  else if (sort === 'spend')  data.sort((a, b) => b.tenure_months - a.tenure_months);
  else                         data.sort((a, b) => parseInt(b.staff) - parseInt(a.staff));

  /* ── Metrics (always from full dataset) ── */
  const all = COMPANIES;
  document.getElementById('m-total').textContent = all.length;
  document.getElementById('m-hot').textContent = all.filter(c => c.score >= 85).length;
  const avgT = all.length ? (all.reduce((s, c) => s + (c.tenure_months || 0), 0) / all.length).toFixed(1) : '0';
  document.getElementById('m-tenure').textContent = avgT + 'm';
  document.getElementById('m-sectors').textContent = [...new Set(all.map(c => c.sector))].length;
  document.getElementById('result-count').textContent = data.length + ' companies';

  /* ── Cards ── */
  if (data.length === 0) {
    document.getElementById('grid').innerHTML = `
      <div class="empty-state">
        <h3>No companies match this filter</h3>
        <p>Try adjusting the region or platform filters, or select a different sector tab.</p>
      </div>`;
    return;
  }

  document.getElementById('grid').innerHTML = data.map(c => {
    const p = pct(c.spend);
    const pSign = p >= 0 ? '+' : '';
    return `
<div class="card${c.score >= 85 ? ' card-hot' : ''}">
  <div class="card-top">
    <div class="avatar" style="background:${c.avatarBg};color:${c.avatarCol}">${c.avatar}</div>
    <div class="card-meta">
      <div class="card-name">
        ${c.page_url
          ? `<a href="${escHtml(c.page_url)}" target="_blank" rel="noopener noreferrer" class="name-link" title="Open ${c.page_url_source === 'google' ? 'Google-fallback ' : ''}page in new tab">${escHtml(c.name)}<span class="link-arrow">&#x2197;</span></a>${c.page_url_source === 'google' ? '<span class="src-badge src-google" title="Resolved via Google search — spot-check">?</span>' : ''}`
          : escHtml(c.name)
        }
        ${c.country === 'IE' ? '<span class="ie-badge">IE</span>' : ''}
        ${c.is_new_this_week ? '<span class="new-badge">NEW</span>' : ''}
        ${c.hot_trigger ? `<span class="trigger-tag">${escHtml(c.hot_trigger)}</span>` : ''}
      </div>
      <div class="card-sub">${escHtml(c.sector)} · ${escHtml(c.region_label)} · ${staffLabel(c.staff)}</div>
    </div>
    <div class="score-badge ${scoreClass(c.score)}">${scoreLabel(c.score)} ${c.score}</div>
  </div>

  <div class="card-body">
    <div class="info-block">
      <div class="info-label">Ad tenure</div>
      <div class="info-val">${escHtml(c.tenure_label)}</div>
    </div>
    <div class="info-block">
      <div class="info-label">Audience</div>
      <div class="info-val" style="font-size:11px">${escHtml(c.audience)}</div>
    </div>
    <div class="info-block">
      <div class="info-label">Top keywords</div>
      <div class="info-val" style="font-size:11px">${escHtml(c.keywords)}</div>
    </div>
  </div>

  <div class="platforms">
    ${['google','meta','tiktok'].map(p => platformPill(p, (c.platforms||[]).includes(p))).join('')}
  </div>

  <div class="sparkline-row">
    <span class="sparkline-label">Spend trend</span>
    <div class="sparkline-wrap">
      <svg id="spk-${c.id}" viewBox="0 0 120 28" preserveAspectRatio="none"></svg>
    </div>
    <span class="sparkline-pct${pctClass(c.score)}">${pSign}${p}%</span>
  </div>

  <div class="contact-row">
    <div class="contact-info">
      <div class="contact-name">${escHtml(c.contact.name)}</div>
      <div class="contact-role">${escHtml(c.contact.role)}</div>
    </div>
    <div class="contact-links">
      <button class="btn-email" onclick="showEmailDraft(${c.id})" title="Open the ready-to-send email body for ${escHtml(c.sector)} — copy + paste into Gmail">Copy email</button>
      <button class="btn-reach" onclick="sendPrompt('sequence', ${c.id})">Reach out ↗</button>
      <button id="send-btn-${c.id}" class="btn-send-video" onclick="sendVideo(${c.id})" title="${c.contact && c.contact.email ? 'Send the ' + escHtml(c.sector) + ' video to ' + escHtml(c.contact.email) : 'Prompts for an email — not enriched yet'}">Send video${c.contact && c.contact.email ? '' : ' …'}</button>
    </div>
  </div>
  <div id="send-status-${c.id}" class="send-status"></div>
</div>`;
  }).join('');

  // Draw sparklines after DOM update
  requestAnimationFrame(() => {
    data.forEach(c => drawSpark(c.id, c.spend, sparkColor(c.score)));
  });
}

/* ── XSS guard ── */
function escHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

/* ── Boot ── */
loadData();
loadManifest();
</script>
</body>
</html>
